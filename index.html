<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>積み木ゲーム</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-dir" href="assets" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }
        #bevy-container {
            width: 100%;
            height: 100%;
        }

        /* ローディング画面 */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.4s ease-out;
        }
        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-text {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-family: system-ui, sans-serif;
            font-size: 14px;
            letter-spacing: 0.05em;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 画面サイズ警告 */
        #size-warning {
            display: none;
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
        }
        #size-warning .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        #size-warning .message {
            color: rgba(255, 255, 255, 0.85);
            font-family: system-ui, sans-serif;
            font-size: 16px;
            line-height: 1.6;
        }
        #size-warning .sub {
            color: rgba(255, 255, 255, 0.5);
            font-family: system-ui, sans-serif;
            font-size: 13px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <!-- 画面サイズ警告 -->
    <div id="size-warning">
        <div class="icon">&#x1F4F1;</div>
        <p class="message">画面サイズが小さすぎます。<br>ブラウザのウィンドウを<br>大きくしてください。</p>
        <p class="sub">最低 360 x 580 px 必要です</p>
    </div>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p class="loading-text">Loading…</p>
    </div>
    <div id="bevy-container">
        <canvas id="bevy-canvas"></canvas>
    </div>

    <script>
        const MIN_WIDTH = 360;
        const MIN_HEIGHT = 580;

        function checkSize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const warning = document.getElementById('size-warning');
            const container = document.getElementById('bevy-container');

            if (w < MIN_WIDTH || h < MIN_HEIGHT) {
                warning.style.display = 'flex';
                container.style.display = 'none';
            } else {
                warning.style.display = 'none';
                container.style.display = 'block';
            }
        }

        checkSize();
        window.addEventListener('resize', checkSize);
    </script>
</body>
</html>
